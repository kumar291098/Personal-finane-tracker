spring.datasource.url=jdbc:postgresql://localhost:5432/finance_tracker
spring.datasource.username=postgres
spring.datasource.password=root
server.port=8080
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
ai.provider=${AI_PROVIDER:openai}
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5-mini}
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.redis.url=${REDIS_URL:}
app.password-reset.expose-otp=${PASSWORD_RESET_EXPOSE_OTP:false}
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:}
brevo.sender.name=${BREVO_SENDER_NAME:FinanceTracker}
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
subscription.subscriber.amount-paise=${SUBSCRIBER_PLAN_AMOUNT_PAISE:9900}
subscription.upi.id=${SUBSCRIPTION_UPI_ID:}
subscription.upi.qr-image-url=${SUBSCRIPTION_UPI_QR_IMAGE_URL:}
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Actuator monitoring
management.endpoints.web.base-path=/api/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:false}
management.info.env.enabled=true
management.metrics.tags.application=finance-tracker
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.http.server.requests=true
info.app.name=Personal Finance Tracker
info.app.description=Spring Boot backend for the finance tracker

# Keep production logs useful without exposing OTP email bodies or noisy SQL/debug output.
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web.client=${LOG_LEVEL_SPRING_WEB_CLIENT:WARN}
logging.level.org.springframework.web.servlet=${LOG_LEVEL_SPRING_WEB_SERVLET:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}
